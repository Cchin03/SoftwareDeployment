services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: eshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-eshop_db}
      MYSQL_USER: ${DB_USER:-eshop_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-eshop_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - eshop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Next.js Application (Development)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: eshop-dev
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-eshop_user}
      DB_PASSWORD: ${DB_PASSWORD:-eshop_password}
      DB_DATABASE: ${DB_DATABASE:-eshop_db}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eshop-network
    restart: unless-stopped
    command: npm run dev

  # Next.js Application (Production)
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eshop-prod
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-eshop_user}
      DB_PASSWORD: ${DB_PASSWORD:-eshop_password}
      DB_DATABASE: ${DB_DATABASE:-eshop_db}
      NODE_ENV: production
    ports:
      - "3001:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eshop-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Adminer for Database Management (Optional)
  adminer:
    image: adminer
    container_name: eshop-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - eshop-network
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    restart: unless-stopped

  # Prometheus Monitoring (For Tier 4 - Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: eshop-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - eshop-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboard (For Tier 4 - Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: eshop-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - eshop-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  eshop-network:
    driver: bridge
