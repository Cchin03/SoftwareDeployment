name: CI/CD Pipeline - Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/eshop
  NODE_VERSION: '18'

jobs:
  # ============================
  # Stage 1: Code Quality
  # ============================
  code-quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings=0
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ============================
  # Stage 2: Build Application
  # ============================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: code-quality
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./eshop
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================
  # Stage 3: Run Tests
  # ============================
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: eshop_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Next.js build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Wait for MySQL to be ready
        run: |
          npm install -g wait-on
          wait-on tcp:3306 --timeout 30000

      - name: Run database migrations
        run: mysql -h 127.0.0.1 -u root -ptest_password eshop_test < ./eshop/database.sql
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  # ============================
  # Stage 4: Deploy to Staging
  # ============================
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    environment:
      name: staging
      url: https://staging-eshop.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH for staging server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Docker image to staging
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.STAGING_HOST }} \
            'cd /home/ec2-user/eshop && \
             docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop && \
             docker-compose -f docker-compose.yml down && \
             docker-compose -f docker-compose.yml up -d'

      - name: Run smoke tests on staging
        run: |
          for i in {1..5}; do
            if curl -f https://staging-eshop.example.com/api/health; then
              echo "Staging deployment successful!"
              exit 0
            fi
            echo "Attempt $i/5: Health check failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Staging Deployment Successful*\nBranch: develop\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Staging Deployment Failed*\nBranch: develop\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

  # ============================
  # Stage 5: Deploy to Production (Manual Approval)
  # ============================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url: https://eshop.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH for production server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Create database backup (Pre-deployment)
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.PROD_HOST }} \
            'mysqldump -h ${{ secrets.PROD_DB_HOST }} \
             -u ${{ secrets.PROD_DB_USER }} \
             -p${{ secrets.PROD_DB_PASSWORD }} \
             eshop_prod > /backup/eshop_prod_$(date +%Y%m%d_%H%M%S).sql && \
             echo "Database backup completed successfully"'

      - name: Deploy Docker image to production (Blue-Green)
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.PROD_HOST }} \
            'cd /home/ec2-user/eshop && \
             export CURRENT_VERSION=$(cat .current_version 2>/dev/null || echo "blue") && \
             export NEXT_VERSION=$([ "$CURRENT_VERSION" = "blue" ] && echo "green" || echo "blue") && \
             docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest && \
             docker-compose -f docker-compose.$NEXT_VERSION.yml up -d && \
             sleep 30 && \
             if curl -f http://localhost:3001/api/health; then \
               echo $NEXT_VERSION > .current_version && \
               docker-compose -f docker-compose.$CURRENT_VERSION.yml down; \
             else \
               docker-compose -f docker-compose.$NEXT_VERSION.yml down && \
               exit 1; \
             fi'

      - name: Verify production deployment
        run: |
          for i in {1..10}; do
            if curl -f https://eshop.example.com/api/health; then
              echo "Production deployment verified!"
              exit 0
            fi
            echo "Attempt $i/10: Health check failed, retrying in 5s..."
            sleep 5
          done
          exit 1

      - name: Run production smoke tests
        run: |
          curl -f https://eshop.example.com/ && echo "Homepage OK"
          curl -f https://eshop.example.com/mnt/category/electronics && echo "Category page OK"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Production Deployment Successful*\nBranch: main\nCommit: ${{ github.sha }}\nVersion: ${{ github.ref_name }}"
                  }
                }
              ]
            }

      - name: Notify Slack on failure (Rollback instructions)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production deployment failed - ROLLBACK REQUIRED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Production Deployment Failed*\n⚠️ Manual rollback may be required\nBranch: main\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

  # ============================
  # Summary Report
  # ============================
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [code-quality, build, test]
    if: always()
    
    steps:
      - name: Print workflow summary
        run: |
          echo "=== Workflow Summary ==="
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Tests: ${{ needs.test.result }}"
          
          if [ "${{ needs.code-quality.result }}" = "success" ] && \
             [ "${{ needs.build.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ All checks passed!"
            exit 0
          else
            echo "❌ Some checks failed!"
            exit 1
          fi
